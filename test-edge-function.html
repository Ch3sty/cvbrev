<!DOCTYPE html>
<html>
<head>
  <title>Test Edge Function</title>
</head>
<body>
  <h1>Testing match-jobs Edge Function</h1>
  <div id="result"></div>

  <script type="module">
    const supabaseUrl = 'https://dbvbnbkvadvlhjhomibg.supabase.co';

    // YOU NEED TO PASTE YOUR ACCESS TOKEN HERE
    // Get it from browser DevTools -> Application -> Local Storage -> supabase.auth.token
    const accessToken = 'PASTE_YOUR_ACCESS_TOKEN_HERE';

    const userId = 'ccb52d89-12dd-4cf4-b487-7b6d1731e201';
    const selectedAnalysisId = '4249b072-d9b5-4c7d-b8e2-f41d7ea37d7a';

    async function testEdgeFunction() {
      try {
        console.log('Testing edge function...');
        console.log('userId:', userId);
        console.log('selectedAnalysisId:', selectedAnalysisId);

        const response = await fetch(`${supabaseUrl}/functions/v1/match-jobs`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            userId: userId,
            selectedAnalysisId: selectedAnalysisId
          })
        });

        console.log('Response status:', response.status);
        console.log('Response headers:', Object.fromEntries(response.headers.entries()));

        const data = await response.json();
        console.log('Response data:', data);

        document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';

        if (data.success) {
          console.log('✅ SUCCESS!');
          console.log('Jobs found:', data.jobs?.length || 0);
          console.log('Selected Analysis:', data.selectedAnalysis);
        } else {
          console.error('❌ FAILED:', data.error);
        }
      } catch (error) {
        console.error('❌ ERROR:', error);
        document.getElementById('result').innerHTML = '<pre style="color: red;">' + error.toString() + '</pre>';
      }
    }

    // Auto-run if token is provided
    if (accessToken !== 'PASTE_YOUR_ACCESS_TOKEN_HERE') {
      testEdgeFunction();
    } else {
      document.getElementById('result').innerHTML = `
        <h2>Instructions:</h2>
        <ol>
          <li>Go to https://jobbcoach.ai</li>
          <li>Open DevTools (F12)</li>
          <li>Go to Application -> Local Storage -> https://jobbcoach.ai</li>
          <li>Find key starting with "sb-dbvbnbkvadvlhjhomibg-auth-token"</li>
          <li>Copy the "access_token" value</li>
          <li>Paste it in this file where it says "PASTE_YOUR_ACCESS_TOKEN_HERE"</li>
          <li>Reload this page</li>
        </ol>
      `;
    }
  </script>
</body>
</html>
