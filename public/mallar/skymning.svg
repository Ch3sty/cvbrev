<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Skymning - mörk header + orange accent + ljus body -->
  <rect width="300" height="400" fill="white"/>

  <!-- Mörk header (charcoal) -->
  <rect x="0" y="0" width="300" height="120" fill="#0f172a"/>

  <!-- Header content -->
  <rect x="30" y="32" width="160" height="14" fill="#f8fafc" rx="1"/>
  <rect x="30" y="56" width="100" height="5" fill="#fb923c" rx="1"/>
  <rect x="30" y="74" width="120" height="3" fill="#cbd5e1" rx="0.5"/>
  <rect x="30" y="82" width="180" height="3" fill="#cbd5e1" rx="0.5"/>

  <!-- Rektangulärt foto höger (mörk) -->
  <rect x="232" y="22" width="38" height="48" fill="#1e293b" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <rect x="240" y="32" width="22" height="22" fill="#475569" rx="11"/>
  <ellipse cx="251" cy="64" rx="15" ry="8" fill="#475569"/>

  <!-- Orange accent-linje -->
  <defs>
    <linearGradient id="skymningAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect x="0" y="120" width="300" height="3" fill="url(#skymningAccent)"/>

  <!-- Body -->

  <!-- Sammanfattning -->
  <rect x="30" y="142" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="150" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="158" width="200" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Arbetslivserfarenhet -->
  <rect x="30" y="184" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="196" x2="270" y2="196" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="195" width="36" height="2" fill="#0f172a"/>

  <!-- Job 1 -->
  <rect x="30" y="208" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="209" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="218" width="80" height="3" fill="#ea580c" rx="0.5"/>
  <circle cx="33" cy="231" r="2" fill="#0f172a"/>
  <rect x="40" y="229" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <circle cx="33" cy="239" r="2" fill="#0f172a"/>
  <rect x="40" y="237" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="254" x2="270" y2="254" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Job 2 -->
  <rect x="30" y="264" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="265" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="274" width="70" height="3" fill="#ea580c" rx="0.5"/>
  <circle cx="33" cy="287" r="2" fill="#0f172a"/>
  <rect x="40" y="285" width="210" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="30" y="312" width="60" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="324" x2="270" y2="324" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="323" width="36" height="2" fill="#0f172a"/>

  <rect x="30" y="336" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="337" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="346" width="80" height="3" fill="#475569" rx="0.5"/>

  <!-- Sektion: Kompetenser -->
  <rect x="30" y="368" width="80" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="380" x2="270" y2="380" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="379" width="36" height="2" fill="#0f172a"/>
  <rect x="30" y="388" width="220" height="3" fill="#1f2937" rx="0.5"/>
</svg>
