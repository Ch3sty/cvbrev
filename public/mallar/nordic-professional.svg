<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Nordic Professional Template -->
  <defs>
    <linearGradient id="forestGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5016;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d6b1f;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="stoneAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355" />
      <stop offset="100%" style="stop-color:#a68b5b" />
    </linearGradient>
    <linearGradient id="arcticBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90a4" />
      <stop offset="100%" style="stop-color:#6ba3b5" />
    </linearGradient>
    <filter id="paperTexture">
      <feTurbulence baseFrequency="0.9" numOctaves="1" result="noise" />
      <feColorMatrix values="0 0 0 0 0.98 0 0 0 0 0.98 0 0 0 0 0.98 0 0 0 0.05 0"/>
      <feComposite in2="SourceGraphic" operator="multiply"/>
    </filter>
  </defs>
  
  <!-- Paper texture background -->
  <rect width="300" height="400" fill="#fafafa" filter="url(#paperTexture)"/>
  
  <!-- Left sidebar with forest green - clean design -->
  <rect x="0" y="0" width="85" height="400" fill="url(#forestGradient)"/>
  
  <!-- Simple, clean vertical accent line -->
  <rect x="85" y="0" width="2" height="400" fill="rgba(74,144,164,0.3)"/>
  
  <!-- Modern contact section with elegant design -->
  <g id="contact-section">
    <!-- Profile circle with gradient -->
    <circle cx="42" cy="35" r="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <circle cx="42" cy="35" r="12" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    <circle cx="42" cy="35" r="6" fill="rgba(255,255,255,0.2)"/>
    
    <!-- Elegant contact info bars -->
    <rect x="18" y="65" width="48" height="2.5" fill="rgba(255,255,255,0.85)" rx="1.25"/>
    <rect x="18" y="73" width="42" height="2.5" fill="rgba(255,255,255,0.75)" rx="1.25"/>
    <rect x="18" y="81" width="45" height="2.5" fill="rgba(255,255,255,0.75)" rx="1.25"/>
    <rect x="18" y="89" width="38" height="2.5" fill="rgba(255,255,255,0.7)" rx="1.25"/>
  </g>
  
  <!-- Premium skills section with sophisticated design -->
  <g id="skills-section">
    <!-- Section header -->
    <rect x="18" y="120" width="48" height="8" fill="#8b7355" rx="4"/>
    <rect x="20" y="122" width="44" height="4" fill="rgba(255,255,255,0.2)" rx="2"/>
    
    <!-- Elegant skill pills -->
    <rect x="18" y="140" width="42" height="7" fill="rgba(160,140,95,0.9)" rx="3.5"/>
    <rect x="18" y="152" width="38" height="7" fill="rgba(160,140,95,0.8)" rx="3.5"/>
    <rect x="18" y="164" width="45" height="7" fill="rgba(160,140,95,0.8)" rx="3.5"/>
    <rect x="18" y="176" width="35" height="7" fill="rgba(160,140,95,0.7)" rx="3.5"/>
    <rect x="18" y="188" width="41" height="7" fill="rgba(160,140,95,0.7)" rx="3.5"/>
    
    <!-- Subtle highlights on skills -->
    <rect x="20" y="142" width="38" height="3" fill="rgba(255,255,255,0.15)" rx="1.5"/>
    <rect x="20" y="154" width="34" height="3" fill="rgba(255,255,255,0.15)" rx="1.5"/>
    <rect x="20" y="166" width="41" height="3" fill="rgba(255,255,255,0.15)" rx="1.5"/>
  </g>
  
  <!-- Clean language section -->
  <g id="language-section">
    <!-- Simple language indicators -->
    <rect x="18" y="225" width="48" height="6" fill="rgba(255,255,255,0.25)" rx="3"/>
    <rect x="18" y="238" width="42" height="6" fill="rgba(255,255,255,0.25)" rx="3"/>
    <rect x="18" y="251" width="45" height="6" fill="rgba(255,255,255,0.25)" rx="3"/>
    
    <!-- Level indicators -->
    <rect x="50" y="227" width="12" height="2" fill="#4a90a4" rx="1"/>
    <rect x="50" y="240" width="10" height="2" fill="#4a90a4" rx="1"/>
    <rect x="50" y="253" width="8" height="2" fill="#4a90a4" rx="1"/>
  </g>
  
  <!-- Main content area with improved layout -->
  <!-- Asymmetric header with name -->
  <rect x="110" y="35" width="145" height="12" fill="#2c2c2c" rx="6"/>
  <rect x="110" y="52" width="105" height="4" fill="#4a4a4a" rx="2"/>
  
  <!-- Arctic blue accent under name -->
  <rect x="110" y="65" width="65" height="3" fill="url(#arcticBlue)" rx="2"/>
  
  <!-- Professional summary with organic shape -->
  <rect x="110" y="90" width="75" height="6" fill="#2d5016" rx="3"/>
  <rect x="110" y="105" width="160" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="112" width="155" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="119" width="150" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="126" width="145" height="2.5" fill="#4a4a4a" rx="1.25"/>
  
  <!-- Experience section -->
  <rect x="110" y="150" width="85" height="6" fill="#2d5016" rx="3"/>
  
  <!-- Clean section separator -->
  <rect x="110" y="162" width="130" height="1.5" fill="rgba(74,144,164,0.4)" rx="1"/>
  
  <!-- Job entries with Nordic spacing -->
  <rect x="110" y="175" width="95" height="5" fill="#2c2c2c" rx="2"/>
  <rect x="110" y="185" width="75" height="3" fill="#6ba3b5" rx="1"/>
  <rect x="110" y="193" width="140" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="199" width="135" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="205" width="130" height="2.5" fill="#4a4a4a" rx="1.25"/>
  
  <!-- Second job with clean separation -->
  <circle cx="115" cy="225" r="1.5" fill="rgba(74,144,164,0.4)"/>
  <rect x="110" y="235" width="90" height="5" fill="#2c2c2c" rx="2"/>
  <rect x="110" y="245" width="70" height="3" fill="#6ba3b5" rx="1"/>
  <rect x="110" y="253" width="135" height="2.5" fill="#4a4a4a" rx="1.25"/>
  <rect x="110" y="259" width="140" height="2.5" fill="#4a4a4a" rx="1.25"/>
  
  <!-- Education section -->
  <rect x="110" y="285" width="65" height="6" fill="#2d5016" rx="3"/>
  <rect x="110" y="297" width="110" height="2" fill="url(#stoneAccent)" rx="1"/>
  <rect x="110" y="298.5" width="85" height="0.5" fill="rgba(160,140,95,0.5)" rx="0.25"/>
  
  <rect x="110" y="310" width="100" height="5" fill="#2c2c2c" rx="2"/>
  <rect x="110" y="320" width="80" height="3" fill="#6ba3b5" rx="1"/>
  
  <!-- Subtle decorative elements -->
  <ellipse cx="260" cy="150" rx="8" ry="12" fill="rgba(74,144,164,0.08)" transform="rotate(15 260 150)"/>
  
  <!-- Nordic Professional branding -->
  <text x="150" y="385" text-anchor="middle" font-family="system-ui, -apple-system" font-size="11" fill="#2d5016" font-weight="600">Nordic Professional</text>
</svg>