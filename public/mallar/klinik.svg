<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Klinik - centrerad serif med 65/35 + burgundy accent -->
  <rect width="300" height="400" fill="white"/>

  <!-- Centrerad header -->
  <rect x="80" y="34" width="140" height="13" fill="#0f172a" rx="1"/>
  <rect x="100" y="55" width="100" height="5" fill="#9f1239" rx="0.5"/>
  <rect x="60" y="72" width="180" height="3" fill="#475569" rx="0.5"/>
  <line x1="30" y1="90" x2="270" y2="90" stroke="#9f1239" stroke-width="1.2"/>

  <!-- Sammanfattning (justified) -->
  <rect x="30" y="104" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="112" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="120" width="220" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Body grid (vänster ~165px, höger ~80px) -->

  <!-- Vänster: Klinisk tjänstgöring -->
  <rect x="30" y="148" width="100" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="158" x2="190" y2="158" stroke="#9f1239" stroke-width="1"/>

  <!-- Job 1 -->
  <rect x="30" y="170" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="155" y="171" width="35" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="180" width="80" height="3" fill="#9f1239" rx="0.5"/>
  <rect x="32" y="193" width="3" height="3" fill="#9f1239"/>
  <rect x="42" y="192" width="148" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="201" width="3" height="3" fill="#9f1239"/>
  <rect x="42" y="200" width="135" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="209" width="3" height="3" fill="#9f1239"/>
  <rect x="42" y="208" width="120" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="30" y="232" width="90" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="155" y="233" width="35" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="242" width="70" height="3" fill="#9f1239" rx="0.5"/>
  <rect x="32" y="255" width="3" height="3" fill="#9f1239"/>
  <rect x="42" y="254" width="140" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Vänster: Utbildning -->
  <rect x="30" y="284" width="60" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="294" x2="190" y2="294" stroke="#9f1239" stroke-width="1"/>

  <rect x="30" y="306" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="155" y="307" width="35" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="316" width="100" height="3" fill="#475569" rx="0.5"/>

  <!-- Höger: Legitimation -->
  <rect x="200" y="148" width="50" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="200" y1="156" x2="270" y2="156" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="200" y="164" width="55" height="3" fill="#0f172a" rx="0.5"/>
  <rect x="200" y="172" width="40" height="2.5" fill="#64748b" rx="0.5"/>
  <rect x="200" y="184" width="60" height="3" fill="#0f172a" rx="0.5"/>
  <rect x="200" y="192" width="48" height="2.5" fill="#64748b" rx="0.5"/>
  <rect x="200" y="204" width="50" height="3" fill="#0f172a" rx="0.5"/>
  <rect x="200" y="212" width="42" height="2.5" fill="#64748b" rx="0.5"/>

  <!-- Höger: Kompetensområden -->
  <rect x="200" y="232" width="60" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="200" y1="240" x2="270" y2="240" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="200" y="248" width="65" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="255" width="55" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="262" width="60" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="269" width="50" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Höger: Publikationer -->
  <rect x="200" y="288" width="65" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="200" y1="296" x2="270" y2="296" stroke="#e5e7eb" stroke-width="0.8"/>
  <rect x="200" y="304" width="55" height="2.5" fill="#0f172a" rx="0.5"/>
  <rect x="200" y="311" width="65" height="2.5" fill="#64748b" rx="0.5"/>
  <rect x="200" y="320" width="60" height="2.5" fill="#0f172a" rx="0.5"/>
  <rect x="200" y="327" width="55" height="2.5" fill="#64748b" rx="0.5"/>
</svg>
