<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="400" fill="white"/>

  <!-- Header med dubbel border -->
  <rect x="30" y="34" width="160" height="13" fill="#1e3a8a" rx="1"/>
  <rect x="30" y="54" width="100" height="5" fill="#3730a3" rx="1"/>
  <rect x="30" y="68" width="180" height="3" fill="#475569" rx="0.5"/>
  <line x1="30" y1="84" x2="270" y2="84" stroke="#1e3a8a" stroke-width="1"/>
  <line x1="30" y1="88" x2="270" y2="88" stroke="#1e3a8a" stroke-width="1"/>

  <!-- Sammanfattning -->
  <rect x="30" y="100" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="108" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="116" width="200" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Arbetslivserfarenhet (tabellär) -->
  <rect x="30" y="138" width="120" height="3" fill="#1e3a8a" rx="0.5"/>
  <line x1="30" y1="148" x2="270" y2="148" stroke="#1e3a8a"/>

  <!-- Tabellrad 1 -->
  <rect x="30" y="160" width="130" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="180" y="161" width="60" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="180" y="167" width="60" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="30" y="170" width="100" height="3" fill="#475569" rx="0.5"/>
  <text x="30" y="186" font-size="9" fill="#1e3a8a" font-weight="700">›</text>
  <rect x="40" y="184" width="130" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="30" y="194" font-size="9" fill="#1e3a8a" font-weight="700">›</text>
  <rect x="40" y="192" width="120" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="208" x2="270" y2="208" stroke="#e5e7eb"/>

  <!-- Tabellrad 2 -->
  <rect x="30" y="220" width="120" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="180" y="221" width="60" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="180" y="227" width="60" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="30" y="230" width="80" height="3" fill="#475569" rx="0.5"/>
  <text x="30" y="246" font-size="9" fill="#1e3a8a" font-weight="700">›</text>
  <rect x="40" y="244" width="125" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="262" x2="270" y2="262" stroke="#e5e7eb"/>

  <!-- Sektion: Utbildning -->
  <rect x="30" y="280" width="60" height="3" fill="#1e3a8a" rx="0.5"/>
  <line x1="30" y1="290" x2="270" y2="290" stroke="#1e3a8a"/>
  <rect x="30" y="302" width="130" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="220" y="303" width="50" height="3" fill="#475569" rx="0.5"/>
  <rect x="30" y="312" width="100" height="3" fill="#475569" rx="0.5"/>

  <!-- Sektion: Redovisningssystem -->
  <rect x="30" y="338" width="140" height="3" fill="#1e3a8a" rx="0.5"/>
  <line x1="30" y1="348" x2="270" y2="348" stroke="#1e3a8a"/>
  <rect x="30" y="360" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="368" width="200" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="376" width="180" height="3" fill="#1f2937" rx="0.5"/>
</svg>
