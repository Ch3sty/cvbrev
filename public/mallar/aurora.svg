<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Aurora - resultat-första 65/35 layout med emerald→orange gradient -->
  <rect width="300" height="400" fill="white"/>

  <!-- Topp-band: gradient -->
  <defs>
    <linearGradient id="auroraBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="300" height="6" fill="url(#auroraBand)"/>

  <!-- Header med foto -->
  <rect x="30" y="22" width="40" height="40" rx="20" fill="#f1f5f9"/>
  <circle cx="50" cy="42" r="20" fill="#cbd5e1"/>

  <rect x="80" y="26" width="120" height="9" fill="#0f172a" rx="1"/>
  <rect x="80" y="42" width="100" height="5" fill="#047857" rx="1"/>
  <rect x="80" y="56" width="170" height="3" fill="#64748b" rx="0.5"/>

  <line x1="30" y1="78" x2="270" y2="78" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 65/35 grid markering -->
  <!-- Vänster spalt (main, ~165px bred) -->
  <rect x="30" y="92" width="80" height="3" fill="#047857" rx="0.5"/>

  <rect x="30" y="104" width="160" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="111" width="155" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="118" width="140" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Erfarenhet rubrik -->
  <rect x="30" y="138" width="80" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="148" x2="190" y2="148" stroke="#f97316" stroke-width="1.5"/>

  <!-- Job 1 -->
  <rect x="30" y="160" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="155" y="161" width="35" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="170" width="80" height="3" fill="#047857" rx="0.5"/>
  <rect x="32" y="183" width="3" height="3" fill="#f97316" transform="rotate(45 33.5 184.5)"/>
  <rect x="42" y="181" width="148" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="191" width="3" height="3" fill="#f97316" transform="rotate(45 33.5 192.5)"/>
  <rect x="42" y="189" width="135" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="30" y="218" width="90" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="155" y="219" width="35" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="228" width="70" height="3" fill="#047857" rx="0.5"/>

  <!-- Höger spalt (~80px bred, x=200..270) - Key Results card -->
  <rect x="200" y="92" width="70" height="80" fill="#fefce8" stroke="#fde68a" stroke-width="1" rx="3"/>
  <rect x="206" y="100" width="42" height="3" fill="#b45309" rx="0.5"/>
  <text x="206" y="118" font-size="7" fill="#f97316" font-weight="bold">→</text>
  <rect x="214" y="114" width="50" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="214" y="120" width="44" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="206" y="138" font-size="7" fill="#f97316" font-weight="bold">→</text>
  <rect x="214" y="134" width="48" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="214" y="140" width="40" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="206" y="158" font-size="7" fill="#f97316" font-weight="bold">→</text>
  <rect x="214" y="154" width="46" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Höger spalt: Kompetenser -->
  <rect x="200" y="186" width="60" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="200" y1="195" x2="270" y2="195" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="200" y="202" width="40" height="2.5" fill="#047857" rx="0.5"/>
  <rect x="200" y="210" width="65" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="216" width="55" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="226" width="42" height="2.5" fill="#047857" rx="0.5"/>
  <rect x="200" y="234" width="60" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="240" width="50" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Vänster: Utbildning -->
  <rect x="30" y="270" width="60" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="280" x2="190" y2="280" stroke="#f97316" stroke-width="1.5"/>

  <rect x="30" y="290" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="30" y="299" width="100" height="3" fill="#475569" rx="0.5"/>
  <rect x="30" y="307" width="50" height="2.5" fill="#64748b" rx="0.5"/>

  <!-- Höger: Språk -->
  <rect x="200" y="270" width="40" height="3" fill="#0f172a" rx="0.5"/>
  <line x1="200" y1="278" x2="270" y2="278" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="200" y="288" width="35" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="245" y="288" width="22" height="2.5" fill="#64748b" rx="0.5"/>
  <rect x="200" y="296" width="32" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="245" y="296" width="22" height="2.5" fill="#64748b" rx="0.5"/>
</svg>
