<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bygg - en kolumn med behörigheter-block + arbetsplatser pills -->
  <rect width="300" height="400" fill="white"/>

  <!-- Header med tjock orange undre kant -->
  <rect x="30" y="34" width="160" height="14" fill="#0f172a" rx="1"/>
  <rect x="30" y="56" width="100" height="5" fill="#c2410c" rx="1"/>
  <rect x="30" y="70" width="180" height="3" fill="#475569" rx="0.5"/>
  <rect x="30" y="86" width="240" height="3" fill="#f97316"/>

  <!-- Sammanfattning -->
  <rect x="30" y="100" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="108" width="220" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Behörigheter-block -->
  <rect x="30" y="124" width="240" height="56" fill="#fef3e8" stroke="#fed7aa" rx="3"/>
  <rect x="40" y="132" width="100" height="3" fill="#c2410c" rx="0.5"/>
  <!-- Grid 2 kolumner certifikat -->
  <rect x="40" y="146" width="11" height="9" fill="#f97316" rx="1"/>
  <rect x="55" y="148" width="55" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="40" y="160" width="11" height="9" fill="#f97316" rx="1"/>
  <rect x="55" y="162" width="62" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="155" y="146" width="11" height="9" fill="#f97316" rx="1"/>
  <rect x="170" y="148" width="60" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="155" y="160" width="11" height="9" fill="#f97316" rx="1"/>
  <rect x="170" y="162" width="50" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Arbetsplatser pill-rad -->
  <rect x="30" y="195" width="60" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="100" y="192" width="40" height="9" fill="#fff7ed" stroke="#fed7aa" rx="4"/>
  <rect x="103" y="195" width="34" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="146" y="192" width="48" height="9" fill="#fff7ed" stroke="#fed7aa" rx="4"/>
  <rect x="149" y="195" width="42" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="192" width="38" height="9" fill="#fff7ed" stroke="#fed7aa" rx="4"/>
  <rect x="203" y="195" width="32" height="3" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="208" x2="270" y2="208" stroke="#e5e7eb" stroke-dasharray="2 2"/>

  <!-- Sektion: Yrkeserfarenhet -->
  <rect x="30" y="222" width="80" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="30" y="230" width="240" height="2" fill="#f97316"/>

  <!-- Job 1 -->
  <rect x="30" y="244" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="245" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="254" width="80" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="32" y="267" width="6" height="2.5" fill="#f97316"/>
  <rect x="44" y="266" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="275" width="6" height="2.5" fill="#f97316"/>
  <rect x="44" y="274" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="290" x2="270" y2="290" stroke="#f1f5f9"/>

  <!-- Job 2 -->
  <rect x="30" y="300" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="301" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="310" width="70" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="32" y="323" width="6" height="2.5" fill="#f97316"/>
  <rect x="44" y="322" width="210" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="30" y="350" width="60" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="30" y="358" width="240" height="2" fill="#f97316"/>
  <rect x="30" y="372" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="373" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="382" width="80" height="3" fill="#475569" rx="0.5"/>
