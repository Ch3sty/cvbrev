<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="400" fill="white"/>

  <!-- Tre-kolumns header: namn / foto / snabbfakta -->
  <!-- Vänster: namn -->
  <rect x="20" y="30" width="90" height="11" fill="#1e3a8a" rx="0.5"/>
  <rect x="20" y="48" width="60" height="5" fill="#3730a3" rx="0.5"/>
  <rect x="20" y="60" width="80" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="20" y="66" width="80" height="2.5" fill="#475569" rx="0.5"/>
  <rect x="20" y="72" width="80" height="2.5" fill="#475569" rx="0.5"/>

  <!-- Centrum: foto -->
  <circle cx="150" cy="55" r="22" fill="#1e3a8a"/>
  <circle cx="150" cy="55" r="18" fill="#eff6ff"/>
  <text x="150" y="62" text-anchor="middle" font-family="Inter,sans-serif" font-size="20" font-weight="800" fill="#1e3a8a">A</text>

  <!-- Höger: snabbfakta -->
  <rect x="190" y="30" width="80" height="3" fill="#10b981" rx="0.5"/>
  <text x="190" y="48" font-family="Inter,sans-serif" font-size="6" fill="#10b981">→</text>
  <rect x="200" y="42" width="70" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="48" width="60" height="3" fill="#1f2937" rx="0.5"/>
  <text x="190" y="62" font-family="Inter,sans-serif" font-size="6" fill="#10b981">→</text>
  <rect x="200" y="58" width="65" height="3" fill="#1f2937" rx="0.5"/>
  <text x="190" y="76" font-family="Inter,sans-serif" font-size="6" fill="#10b981">→</text>
  <rect x="200" y="72" width="55" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="kpGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <line x1="20" y1="92" x2="280" y2="92" stroke="#1e3a8a" stroke-width="0.7"/>
  <rect x="20" y="94" width="260" height="2" fill="url(#kpGrad)"/>

  <!-- Sammanfattning -->
  <rect x="20" y="110" width="260" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="20" y="118" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="20" y="126" width="220" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Arbetslivserfarenhet (tabellär) -->
  <rect x="20" y="148" width="120" height="6" fill="#1e3a8a" rx="1"/>
  <rect x="20" y="160" width="260" height="1.2" fill="#1e3a8a"/>

  <rect x="20" y="170" width="170" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="20" y="180" width="100" height="3" fill="#475569" rx="0.5"/>
  <rect x="220" y="170" width="60" height="3" fill="#1e3a8a" rx="0.5"/>
  <rect x="220" y="178" width="60" height="3" fill="#1e3a8a" rx="0.5"/>
  <text x="20" y="194" font-family="Inter,sans-serif" font-size="5" fill="#10b981">›</text>
  <rect x="26" y="190" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="20" y="202" font-family="Inter,sans-serif" font-size="5" fill="#10b981">›</text>
  <rect x="26" y="198" width="200" height="2.5" fill="#1f2937" rx="0.5"/>

  <line x1="20" y1="214" x2="280" y2="214" stroke="#e5e7eb"/>

  <rect x="20" y="222" width="130" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="20" y="232" width="80" height="3" fill="#475569" rx="0.5"/>
  <rect x="220" y="222" width="60" height="3" fill="#1e3a8a" rx="0.5"/>
  <rect x="220" y="230" width="60" height="3" fill="#1e3a8a" rx="0.5"/>
  <text x="20" y="246" font-family="Inter,sans-serif" font-size="5" fill="#10b981">›</text>
  <rect x="26" y="242" width="200" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Redovisningssystem -->
  <rect x="20" y="276" width="160" height="6" fill="#1e3a8a" rx="1"/>
  <rect x="20" y="288" width="260" height="1.2" fill="#1e3a8a"/>
  <rect x="20" y="296" width="60" height="4" fill="#1e3a8a" rx="0.5"/>
  <rect x="90" y="297" width="180" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="20" y="322" width="80" height="6" fill="#1e3a8a" rx="1"/>
  <rect x="20" y="334" width="260" height="1.2" fill="#1e3a8a"/>
  <rect x="20" y="346" width="120" height="3.5" fill="#1e3a8a" rx="0.5"/>
  <rect x="220" y="346" width="50" height="3" fill="#475569" rx="0.5"/>
  <rect x="20" y="356" width="80" height="3" fill="#475569" rx="0.5"/>

  <!-- Språk -->
  <rect x="20" y="372" width="40" height="3" fill="#1e3a8a" rx="0.5"/>
  <rect x="240" y="372" width="40" height="3" fill="#475569" rx="0.5"/>
  <line x1="20" y1="382" x2="280" y2="382" stroke="#e5e7eb" stroke-dasharray="2,2"/>
  <rect x="20" y="386" width="40" height="3" fill="#1e3a8a" rx="0.5"/>
  <rect x="240" y="386" width="40" height="3" fill="#475569" rx="0.5"/>
</svg>
