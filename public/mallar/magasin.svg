<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Magasin - tidnings-cover med stort foto -->
  <rect width="300" height="400" fill="white"/>

  <!-- Cover-grid: stort foto vänster + namn höger -->
  <!-- Stort foto -->
  <rect x="20" y="22" width="100" height="130" fill="#cbd5e1"/>
  <circle cx="70" cy="64" r="18" fill="#94a3b8"/>
  <ellipse cx="70" cy="120" rx="34" ry="20" fill="#94a3b8"/>

  <!-- Höger: eyebrow + stort namn + roll + meta -->
  <rect x="135" y="22" width="60" height="3" fill="#991b1b" rx="0.5"/>
  <line x1="135" y1="32" x2="280" y2="32" stroke="#991b1b" stroke-width="0.8"/>

  <!-- Stort serif-namn (48px CV → ~17px thumb) -->
  <rect x="135" y="42" width="140" height="15" fill="#0f172a" rx="1"/>
  <rect x="135" y="62" width="100" height="14" fill="#0f172a" rx="1"/>

  <!-- Roll i italic -->
  <rect x="135" y="84" width="120" height="5" fill="#475569" rx="0.5"/>

  <!-- Meta i mono-stil -->
  <rect x="135" y="104" width="35" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="180" y="104" width="80" height="3" fill="#475569" rx="0.5"/>
  <rect x="135" y="114" width="25" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="180" y="114" width="60" height="3" fill="#475569" rx="0.5"/>
  <rect x="135" y="124" width="35" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="180" y="124" width="70" height="3" fill="#475569" rx="0.5"/>
  <rect x="135" y="134" width="50" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="190" y="134" width="60" height="3" fill="#991b1b" rx="0.5"/>

  <!-- Tjock röd border under cover -->
  <rect x="0" y="160" width="300" height="4" fill="#991b1b"/>

  <!-- Sammanfattning som blockquote -->
  <rect x="20" y="180" width="4" height="30" fill="#991b1b"/>
  <rect x="32" y="184" width="240" height="4" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="194" width="220" height="4" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="204" width="180" height="4" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Erfarenhet -->
  <rect x="20" y="232" width="100" height="6" fill="#0f172a" rx="0.5"/>
  <line x1="20" y1="246" x2="280" y2="246" stroke="#991b1b" stroke-width="1.5"/>

  <!-- Job 1 -->
  <rect x="20" y="258" width="120" height="5" fill="#0f172a" rx="0.5"/>
  <rect x="225" y="259" width="48" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="20" y="270" width="80" height="3.5" fill="#991b1b" rx="0.5"/>
  <rect x="20" y="284" width="8" height="1.5" fill="#991b1b"/>
  <rect x="32" y="283" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="20" y="293" width="8" height="1.5" fill="#991b1b"/>
  <rect x="32" y="292" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="20" y="302" width="8" height="1.5" fill="#991b1b"/>
  <rect x="32" y="301" width="180" height="2.5" fill="#1f2937" rx="0.5"/>

  <line x1="20" y1="318" x2="280" y2="318" stroke="#f1f5f9"/>

  <!-- Job 2 -->
  <rect x="20" y="330" width="100" height="5" fill="#0f172a" rx="0.5"/>
  <rect x="225" y="331" width="48" height="3" fill="#991b1b" rx="0.5"/>
  <rect x="20" y="342" width="70" height="3.5" fill="#991b1b" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="20" y="368" width="60" height="6" fill="#0f172a" rx="0.5"/>
  <line x1="20" y1="382" x2="280" y2="382" stroke="#991b1b" stroke-width="1.5"/>
  <rect x="20" y="392" width="120" height="4" fill="#0f172a" rx="0.5"/>
</svg>
