<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spektrum - levande gradient sidopanel -->
  <rect width="300" height="400" fill="white"/>

  <!-- Sidopanel med gradient -->
  <defs>
    <linearGradient id="spektrumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="spektrumText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="105" height="400" fill="url(#spektrumGrad)"/>

  <!-- Foto cirkel -->
  <circle cx="52" cy="48" r="24" fill="white" opacity="0.95"/>
  <circle cx="52" cy="48" r="21" fill="#cbd5e1"/>

  <!-- Sidopanel: Kontakt -->
  <rect x="14" y="90" width="50" height="3" fill="white" opacity="0.95"/>
  <line x1="14" y1="100" x2="92" y2="100" stroke="white" opacity="0.55"/>
  <rect x="14" y="106" width="78" height="2.5" fill="white" opacity="0.94"/>
  <rect x="14" y="113" width="60" height="2.5" fill="white" opacity="0.94"/>
  <rect x="14" y="120" width="70" height="2.5" fill="white" opacity="0.94"/>

  <!-- Sidopanel: Kompetenser med dots -->
  <rect x="14" y="142" width="65" height="3" fill="white" opacity="0.95"/>
  <line x1="14" y1="152" x2="92" y2="152" stroke="white" opacity="0.55"/>
  <circle cx="18" cy="162" r="2" fill="white"/>
  <rect x="24" y="161" width="62" height="2.5" fill="white" opacity="0.94"/>
  <circle cx="18" cy="172" r="2" fill="white"/>
  <rect x="24" y="171" width="55" height="2.5" fill="white" opacity="0.94"/>
  <circle cx="18" cy="182" r="2" fill="white"/>
  <rect x="24" y="181" width="68" height="2.5" fill="white" opacity="0.94"/>
  <circle cx="18" cy="192" r="2" fill="white"/>
  <rect x="24" y="191" width="50" height="2.5" fill="white" opacity="0.94"/>
  <circle cx="18" cy="202" r="2" fill="white"/>
  <rect x="24" y="201" width="60" height="2.5" fill="white" opacity="0.94"/>

  <!-- Sidopanel: Sprak -->
  <rect x="14" y="226" width="40" height="3" fill="white" opacity="0.95"/>
  <line x1="14" y1="236" x2="92" y2="236" stroke="white" opacity="0.55"/>
  <rect x="14" y="245" width="32" height="2.5" fill="white"/>
  <rect x="60" y="245" width="28" height="2.5" fill="white" opacity="0.78"/>
  <rect x="14" y="255" width="38" height="2.5" fill="white"/>
  <rect x="60" y="255" width="28" height="2.5" fill="white" opacity="0.78"/>

  <!-- Main: Header (med gradient-roll) -->
  <rect x="118" y="34" width="120" height="13" fill="#0f172a" rx="1"/>
  <rect x="118" y="54" width="80" height="5" fill="url(#spektrumText)" rx="1"/>
  <line x1="118" y1="72" x2="280" y2="72" stroke="#db2777" stroke-width="1.5"/>

  <!-- Sammanfattning -->
  <rect x="118" y="86" width="160" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="118" y="94" width="155" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="118" y="102" width="140" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Erfarenhet (gradient text) -->
  <rect x="118" y="124" width="100" height="4" fill="url(#spektrumText)" rx="0.5"/>
  <line x1="118" y1="134" x2="280" y2="134" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Job 1 -->
  <rect x="118" y="146" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="240" y="147" width="40" height="3" fill="#64748b" rx="0.5"/>
  <rect x="118" y="156" width="80" height="3" fill="#db2777" rx="0.5"/>
  <circle cx="121" cy="170" r="3" fill="url(#spektrumText)"/>
  <rect x="130" y="168" width="148" height="2.5" fill="#1f2937" rx="0.5"/>
  <circle cx="121" cy="178" r="3" fill="url(#spektrumText)"/>
  <rect x="130" y="176" width="135" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="118" y1="194" x2="280" y2="194" stroke="#f1f5f9"/>

  <!-- Job 2 -->
  <rect x="118" y="206" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="240" y="207" width="40" height="3" fill="#64748b" rx="0.5"/>
  <rect x="118" y="216" width="70" height="3" fill="#db2777" rx="0.5"/>
  <circle cx="121" cy="230" r="3" fill="url(#spektrumText)"/>
  <rect x="130" y="228" width="140" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="118" y="262" width="60" height="4" fill="url(#spektrumText)" rx="0.5"/>
  <line x1="118" y1="272" x2="280" y2="272" stroke="#f1f5f9" stroke-width="1"/>
  <rect x="118" y="284" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="240" y="285" width="40" height="3" fill="#64748b" rx="0.5"/>
  <rect x="118" y="294" width="80" height="3" fill="#475569" rx="0.5"/>
</svg>
