<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Kvist - skogsgrön header-band + vit body -->
  <rect width="300" height="400" fill="white"/>

  <!-- Skogsgrön header-band (~25% av sidan) -->
  <rect x="0" y="0" width="300" height="100" fill="#14532d"/>

  <!-- Header content -->
  <rect x="30" y="32" width="160" height="14" fill="#f0fdf4" rx="1"/>
  <rect x="30" y="56" width="100" height="5" fill="#86efac" rx="1"/>
  <rect x="30" y="74" width="180" height="3" fill="#dcfce7" rx="0.5" opacity="0.92"/>

  <!-- Foto cirkel höger (mörk) -->
  <circle cx="252" cy="50" r="22" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
  <circle cx="252" cy="50" r="20" fill="#1e293b"/>

  <!-- Gradient under header -->
  <defs>
    <linearGradient id="kvistAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect x="0" y="100" width="300" height="4" fill="url(#kvistAccent)"/>

  <!-- Body -->

  <!-- Sammanfattning som blockquote -->
  <rect x="30" y="124" width="3" height="32" fill="#16a34a"/>
  <rect x="42" y="126" width="220" height="3.5" fill="#1f2937" rx="0.5"/>
  <rect x="42" y="136" width="210" height="3.5" fill="#1f2937" rx="0.5"/>
  <rect x="42" y="146" width="180" height="3.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Arbetslivserfarenhet -->
  <rect x="30" y="178" width="100" height="4" fill="#14532d" rx="0.5"/>
  <line x1="30" y1="190" x2="270" y2="190" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="189" width="36" height="2" fill="#16a34a"/>

  <!-- Job 1 -->
  <rect x="30" y="202" width="120" height="4" fill="#14532d" rx="0.5"/>
  <rect x="220" y="203" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="212" width="80" height="3" fill="#16a34a" rx="0.5"/>
  <rect x="32" y="225" width="6" height="6" fill="#16a34a" transform="rotate(45 35 228)"/>
  <rect x="44" y="224" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="32" y="233" width="6" height="6" fill="#16a34a" transform="rotate(45 35 236)"/>
  <rect x="44" y="232" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="250" x2="270" y2="250" stroke="#f0fdf4"/>

  <!-- Job 2 -->
  <rect x="30" y="262" width="100" height="4" fill="#14532d" rx="0.5"/>
  <rect x="220" y="263" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="272" width="70" height="3" fill="#16a34a" rx="0.5"/>

  <!-- Sektion: Hållbarhetsprojekt -->
  <rect x="30" y="298" width="120" height="4" fill="#14532d" rx="0.5"/>
  <line x1="30" y1="310" x2="270" y2="310" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="309" width="36" height="2" fill="#16a34a"/>

  <!-- Project block -->
  <rect x="30" y="320" width="240" height="22" fill="#f0fdf4"/>
  <rect x="30" y="320" width="3" height="22" fill="#16a34a"/>
  <rect x="42" y="324" width="100" height="3" fill="#14532d" rx="0.5"/>
  <rect x="42" y="333" width="180" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="30" y="358" width="60" height="4" fill="#14532d" rx="0.5"/>
  <line x1="30" y1="370" x2="270" y2="370" stroke="#d1fae5" stroke-width="1"/>
  <rect x="30" y="369" width="36" height="2" fill="#16a34a"/>
  <rect x="30" y="382" width="120" height="4" fill="#14532d" rx="0.5"/>
  <rect x="220" y="383" width="50" height="3" fill="#64748b" rx="0.5"/>
</svg>
