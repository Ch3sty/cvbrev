  <path d="M14 53 L18.5 57 L23 53" stroke="#f97316" stroke-width="1.2" fill="none"/>
  <rect x="28" y="53" width="55" height="3" fill="#374151" rx="1"/>
  <rect x="28" y="58" width="40" height="3" fill="#374151" rx="1"/>

