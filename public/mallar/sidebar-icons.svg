  <rect x="125" y="196" width="55" height="3" fill="#f97316" rx="1"/>
  <circle cx="129" cy="207" r="1" fill="#d1d5db"/>
  <rect x="135" y="206" width="130" height="2.5" fill="#374151" rx="1"/>
  <circle cx="129" cy="214" r="1" fill="#d1d5db"/>
