<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Aspekt - bred professional med foto höger + slate-blå accent -->
  <rect width="300" height="400" fill="white"/>

  <!-- Header med foto -->
  <rect x="30" y="34" width="160" height="14" fill="#0f172a" rx="1"/>
  <rect x="30" y="56" width="100" height="5" fill="#1e40af" rx="1"/>
  <rect x="30" y="70" width="180" height="3" fill="#475569" rx="0.5"/>

  <!-- Rektangulärt foto höger -->
  <rect x="232" y="32" width="38" height="48" fill="#cbd5e1" stroke="white" stroke-width="2"/>

  <line x1="30" y1="92" x2="270" y2="92" stroke="#1e40af" stroke-width="1.5"/>

  <!-- Sammanfattning -->
  <rect x="30" y="106" width="240" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="114" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="122" width="200" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Fokusområden pills -->
  <rect x="30" y="138" width="46" height="11" fill="#eef2ff" stroke="#c7d2fe" rx="5"/>
  <rect x="34" y="142" width="38" height="3" fill="#1e40af" rx="0.5"/>
  <rect x="80" y="138" width="50" height="11" fill="#eef2ff" stroke="#c7d2fe" rx="5"/>
  <rect x="84" y="142" width="42" height="3" fill="#1e40af" rx="0.5"/>
  <rect x="134" y="138" width="42" height="11" fill="#eef2ff" stroke="#c7d2fe" rx="5"/>
  <rect x="138" y="142" width="34" height="3" fill="#1e40af" rx="0.5"/>
  <rect x="180" y="138" width="48" height="11" fill="#eef2ff" stroke="#c7d2fe" rx="5"/>
  <rect x="184" y="142" width="40" height="3" fill="#1e40af" rx="0.5"/>

  <!-- Sektion: Arbetslivserfarenhet -->
  <rect x="30" y="170" width="100" height="5" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="184" x2="270" y2="184" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="183" width="36" height="2" fill="#1e40af"/>

  <!-- Job 1 -->
  <rect x="30" y="196" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="197" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="206" width="80" height="3" fill="#1e40af" rx="0.5"/>
  <rect x="30" y="219" width="6" height="2.5" fill="#1e40af" transform="rotate(45 33 220.5)"/>
  <rect x="42" y="218" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="227" width="6" height="2.5" fill="#1e40af" transform="rotate(45 33 228.5)"/>
  <rect x="42" y="226" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <line x1="30" y1="244" x2="270" y2="244" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Job 2 -->
  <rect x="30" y="254" width="100" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="255" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="264" width="70" height="3" fill="#1e40af" rx="0.5"/>
  <rect x="30" y="277" width="6" height="2.5" fill="#1e40af" transform="rotate(45 33 278.5)"/>
  <rect x="42" y="276" width="210" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <rect x="30" y="304" width="60" height="5" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="318" x2="270" y2="318" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="317" width="36" height="2" fill="#1e40af"/>

  <rect x="30" y="330" width="120" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="331" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="340" width="80" height="3" fill="#475569" rx="0.5"/>

  <!-- Sektion: Kompetenser -->
  <rect x="30" y="362" width="60" height="5" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="376" x2="270" y2="376" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="375" width="36" height="2" fill="#1e40af"/>
  <rect x="30" y="386" width="220" height="3" fill="#1f2937" rx="0.5"/>
