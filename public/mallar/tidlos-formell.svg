<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tidlos Template - centered formal layout, serif typography -->
  <rect width="300" height="400" fill="white"/>

  <!-- ===== Centrerad header ===== -->
  <!-- Stort namn (centrerat) -->
  <rect x="92" y="38" width="116" height="11" fill="#111827" rx="1"/>
  <!-- Titel (kursiv, mindre) -->
  <rect x="115" y="56" width="70" height="5" fill="#4b5563" rx="1"/>
  <!-- Kontakt-rad 1 (centrerad) -->
  <rect x="80" y="76" width="140" height="3" fill="#1f2937" rx="0.5"/>
  <!-- Kontakt-rad 2 (centrerad) -->
  <rect x="105" y="84" width="90" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Horisontell divider (svart) -->
  <line x1="40" y1="102" x2="260" y2="102" stroke="#1f2937" stroke-width="1"/>

  <!-- ===== Sammanfattning (justified text) ===== -->
  <rect x="40" y="118" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="40" y="126" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="40" y="134" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="40" y="142" width="180" height="3" fill="#1f2937" rx="0.5"/>

  <!-- ===== Arbetslivserfarenhet med ─ linjer ===== -->
  <!-- Sektion-rubrik med linjer på bägge sidor -->
  <line x1="40" y1="170" x2="105" y2="170" stroke="#d1d5db" stroke-width="1"/>
  <rect x="111" y="167" width="78" height="4" fill="#1f2937" rx="0.5"/>
  <line x1="195" y1="170" x2="260" y2="170" stroke="#d1d5db" stroke-width="1"/>

  <!-- Job 1: titel vänster + period (italic dark green) höger -->
  <rect x="40" y="184" width="100" height="4" fill="#111827" rx="0.5"/>
  <rect x="220" y="185" width="40" height="3" fill="#064e3b" rx="0.5"/>
  <!-- Företag (italic) -->
  <rect x="40" y="194" width="70" height="3" fill="#4b5563" rx="0.5"/>
  <!-- Beskrivning med – (en-dash) -->
  <text x="40" y="208" font-size="6" fill="#6b7280">–</text>
  <rect x="48" y="205" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="40" y="216" font-size="6" fill="#6b7280">–</text>
  <rect x="48" y="213" width="180" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="40" y="230" width="90" height="4" fill="#111827" rx="0.5"/>
  <rect x="220" y="231" width="40" height="3" fill="#064e3b" rx="0.5"/>
  <rect x="40" y="240" width="65" height="3" fill="#4b5563" rx="0.5"/>
  <text x="40" y="254" font-size="6" fill="#6b7280">–</text>
  <rect x="48" y="251" width="195" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- ===== Utbildning ===== -->
  <line x1="40" y1="278" x2="120" y2="278" stroke="#d1d5db" stroke-width="1"/>
  <rect x="126" y="275" width="48" height="4" fill="#1f2937" rx="0.5"/>
  <line x1="180" y1="278" x2="260" y2="278" stroke="#d1d5db" stroke-width="1"/>

  <rect x="40" y="290" width="110" height="4" fill="#111827" rx="0.5"/>
  <rect x="225" y="291" width="35" height="3" fill="#064e3b" rx="0.5"/>
  <rect x="40" y="300" width="80" height="3" fill="#4b5563" rx="0.5"/>

  <!-- ===== Kompetenser (kommaseparerade rader) ===== -->
  <line x1="40" y1="324" x2="115" y2="324" stroke="#d1d5db" stroke-width="1"/>
  <rect x="121" y="321" width="58" height="4" fill="#1f2937" rx="0.5"/>
  <line x1="185" y1="324" x2="260" y2="324" stroke="#d1d5db" stroke-width="1"/>

  <rect x="40" y="338" width="220" height="3" fill="#1f2937" rx="0.5"/>
  <rect x="40" y="346" width="195" height="3" fill="#1f2937" rx="0.5"/>

  <!-- Referenser (italic, centerd) -->
  <line x1="40" y1="372" x2="260" y2="372" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="105" y="380" width="90" height="3" fill="#9ca3af" rx="0.5"/>
</svg>
