  <circle cx="35" cy="320" r="3" fill="#3b82f6"/>
  <rect x="50" y="317" width="80" height="3" fill="#6b7280" rx="1"/>
  
  <text x="150" y="390" text-anchor="middle" font-family="system-ui" font-size="12" fill="#1e40af">Ren Företagsstil</text>
