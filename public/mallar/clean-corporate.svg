  <rect x="30" y="40" width="100" height="5" fill="#3b82f6" rx="2"/>
  <rect x="30" y="52" width="120" height="5" fill="#60a5fa" rx="2"/>
  <rect x="30" y="64" width="90" height="5" fill="#60a5fa" rx="2"/>
  
  <!-- Clean content sections -->
  <rect x="30" y="110" width="70" height="5" fill="#1e40af" rx="2"/>
  <rect x="30" y="125" width="220" height="3" fill="#374151" rx="1"/>
  <rect x="30" y="135" width="200" height="3" fill="#374151" rx="1"/>
  <rect x="30" y="145" width="210" height="3" fill="#374151" rx="1"/>
  <rect x="30" y="155" width="180" height="3" fill="#374151" rx="1"/>
  
  <rect x="30" y="180" width="80" height="5" fill="#1e40af" rx="2"/>
