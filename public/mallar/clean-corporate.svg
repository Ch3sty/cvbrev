  <rect x="30" y="240" width="75" height="5" fill="#1e40af" rx="2"/>
  <rect x="30" y="255" width="180" height="3" fill="#374151" rx="1"/>
  <rect x="30" y="265" width="160" height="3" fill="#374151" rx="1"/>
