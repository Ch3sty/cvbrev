  <!-- Left sidebar with corporate color -->
  <rect x="0" y="0" width="90" height="400" fill="#1e293b"/>
  
  <!-- Main content area -->
  <rect x="90" y="0" width="210" height="400" fill="white"/>
  
  <!-- Header in main area -->
  <rect x="110" y="30" width="130" height="8" fill="#1e293b" rx="4"/>
