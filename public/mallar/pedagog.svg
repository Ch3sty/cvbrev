  <line x1="118" y1="262" x2="280" y2="262" stroke="#84a98c" stroke-width="1.2"/>

  <rect x="118" y="274" width="120" height="4" fill="#1f2937" rx="0.5"/>
  <rect x="240" y="275" width="40" height="3" fill="#64748b" rx="0.5"/>
  <rect x="118" y="284" width="80" height="3" fill="#475569" rx="0.5"/>

