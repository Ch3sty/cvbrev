  <circle cx="44" cy="38" r="4" fill="#cbd5e1"/>
  <path d="M34 53 Q34 47 44 47 Q54 47 54 53 L54 56 L34 56 Z" fill="#cbd5e1"/>

  <!-- Kontakt (höger) -->
  <rect x="218" y="32" width="60" height="3" fill="#4b5563" rx="0.5"/>
