<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Galleri - designermall med rektangulärt foto + tools-grid + peach-accent -->
  <rect width="300" height="400" fill="white"/>

  <!-- Peach-accent block i övre höger -->
  <rect x="245" y="0" width="55" height="22" fill="#fed7aa"/>

  <!-- Header: namn vänster + foto höger -->
  <rect x="30" y="34" width="160" height="14" fill="#0f172a" rx="1"/>
  <rect x="30" y="56" width="100" height="5" fill="#c2410c" rx="1"/>
  <rect x="30" y="68" width="180" height="3" fill="#64748b" rx="0.5"/>

  <!-- Rektangulärt foto höger (80x100 i CV → ~28x36 i thumbnail) -->
  <rect x="232" y="32" width="38" height="48" fill="#cbd5e1" stroke="#fff" stroke-width="2"/>

  <line x1="30" y1="92" x2="270" y2="92" stroke="#0f172a" stroke-width="1.5"/>

  <!-- Sammanfattning som blockquote (peach left border) -->
  <rect x="30" y="106" width="3" height="32" fill="#fed7aa"/>
  <rect x="42" y="108" width="220" height="3.5" fill="#1f2937" rx="0.5"/>
  <rect x="42" y="118" width="210" height="3.5" fill="#1f2937" rx="0.5"/>
  <rect x="42" y="128" width="180" height="3.5" fill="#1f2937" rx="0.5"/>

  <!-- Section heading: Verktyg & kompetenser -->
  <rect x="30" y="158" width="100" height="6" fill="#0f172a" rx="1"/>

  <!-- Tools grid (3 kolumner) med top/bottom borders -->
  <line x1="30" y1="178" x2="270" y2="178" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Kolumn 1 -->
  <rect x="30" y="186" width="42" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="30" y="196" width="40" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="203" width="36" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="210" width="44" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="217" width="32" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Kolumn 2 -->
  <rect x="115" y="186" width="50" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="115" y="196" width="46" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="203" width="42" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="210" width="38" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="217" width="44" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Kolumn 3 -->
  <rect x="200" y="186" width="48" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="200" y="196" width="42" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="203" width="36" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="210" width="40" height="2.5" fill="#1f2937" rx="0.5"/>

  <line x1="30" y1="232" x2="270" y2="232" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Section: Erfarenhet -->
  <rect x="30" y="248" width="60" height="6" fill="#0f172a" rx="1"/>

  <!-- Job 1 -->
  <rect x="30" y="270" width="120" height="5" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="271" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="282" width="80" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="30" y="294" width="8" height="2" fill="#c2410c"/>
  <rect x="42" y="293" width="220" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="302" width="8" height="2" fill="#c2410c"/>
  <rect x="42" y="301" width="200" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="30" y="322" width="100" height="5" fill="#0f172a" rx="0.5"/>
  <rect x="220" y="323" width="50" height="3" fill="#64748b" rx="0.5"/>
  <rect x="30" y="334" width="70" height="3" fill="#c2410c" rx="0.5"/>
  <rect x="30" y="346" width="8" height="2" fill="#c2410c"/>
  <rect x="42" y="345" width="210" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Section: Utbildning -->
  <rect x="30" y="368" width="60" height="6" fill="#0f172a" rx="1"/>
  <rect x="30" y="384" width="120" height="4" fill="#0f172a" rx="0.5"/>
</svg>
