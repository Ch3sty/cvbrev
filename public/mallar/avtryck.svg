<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Avtryck - cream bakgrund + ramning + retro-serif -->
  <rect width="300" height="400" fill="#fef3e8"/>

  <!-- Outer frame -->
  <rect x="20" y="22" width="260" height="356" fill="none" stroke="#9a3412" stroke-width="1"/>
  <!-- Inner frame -->
  <rect x="24" y="26" width="252" height="348" fill="none" stroke="#9a3412" stroke-width="0.5" opacity="0.4"/>

  <!-- Centrerad header med ornament -->
  <rect x="80" y="46" width="140" height="14" fill="#1c1917" rx="1"/>
  <rect x="100" y="68" width="100" height="5" fill="#9a3412" rx="0.5"/>
  <rect x="60" y="86" width="180" height="3" fill="#57534e" rx="0.5"/>

  <!-- Decorative ornament under header -->
  <line x1="100" y1="106" x2="200" y2="106" stroke="#9a3412" stroke-width="1"/>
  <text x="150" y="112" font-size="10" fill="#9a3412" text-anchor="middle">✦</text>

  <!-- Sammanfattning centrerad italic -->
  <rect x="50" y="128" width="200" height="3" fill="#1c1917" rx="0.5"/>
  <rect x="60" y="138" width="180" height="3" fill="#1c1917" rx="0.5"/>
  <rect x="70" y="148" width="160" height="3" fill="#1c1917" rx="0.5"/>

  <!-- Sektion: Erfarenhet (centrerad rubrik med — § —) -->
  <text x="48" y="184" font-size="10" fill="#9a3412">—</text>
  <rect x="100" y="178" width="100" height="4" fill="#1c1917" rx="0.5"/>
  <text x="244" y="184" font-size="10" fill="#9a3412">—</text>

  <!-- Job 1 -->
  <rect x="40" y="200" width="120" height="5" fill="#1c1917" rx="0.5"/>
  <rect x="220" y="201" width="48" height="3" fill="#9a3412" rx="0.5"/>
  <rect x="40" y="212" width="80" height="3.5" fill="#57534e" rx="0.5"/>
  <text x="42" y="226" font-size="8" fill="#9a3412">◆</text>
  <rect x="52" y="223" width="220" height="2.5" fill="#1c1917" rx="0.5"/>
  <text x="42" y="236" font-size="8" fill="#9a3412">◆</text>
  <rect x="52" y="233" width="200" height="2.5" fill="#1c1917" rx="0.5"/>
  <text x="42" y="246" font-size="8" fill="#9a3412">◆</text>
  <rect x="52" y="243" width="180" height="2.5" fill="#1c1917" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="40" y="266" width="100" height="5" fill="#1c1917" rx="0.5"/>
  <rect x="220" y="267" width="48" height="3" fill="#9a3412" rx="0.5"/>
  <rect x="40" y="278" width="70" height="3.5" fill="#57534e" rx="0.5"/>
  <text x="42" y="292" font-size="8" fill="#9a3412">◆</text>
  <rect x="52" y="289" width="200" height="2.5" fill="#1c1917" rx="0.5"/>

  <!-- Sektion: Utbildning -->
  <text x="60" y="318" font-size="10" fill="#9a3412">—</text>
  <rect x="105" y="312" width="90" height="4" fill="#1c1917" rx="0.5"/>
  <text x="232" y="318" font-size="10" fill="#9a3412">—</text>

  <rect x="40" y="332" width="120" height="4" fill="#1c1917" rx="0.5"/>
  <rect x="220" y="333" width="48" height="3" fill="#9a3412" rx="0.5"/>
  <rect x="40" y="342" width="80" height="3" fill="#57534e" rx="0.5"/>

  <!-- Sektion: Kompetenser (centrerad) -->
  <text x="58" y="368" font-size="10" fill="#9a3412">—</text>
  <rect x="103" y="362" width="94" height="4" fill="#1c1917" rx="0.5"/>
  <text x="234" y="368" font-size="10" fill="#9a3412">—</text>

  <rect x="80" y="378" width="60" height="3" fill="#9a3412" rx="0.5"/>
  <rect x="60" y="386" width="180" height="3" fill="#1c1917" rx="0.5"/>
</svg>
