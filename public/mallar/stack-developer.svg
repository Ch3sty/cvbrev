<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stack Template - left-aligned dev style with skill grid -->
  <rect width="300" height="400" fill="white"/>

  <!-- ===== Header (vansterjusterad) ===== -->
  <!-- Namn -->
  <rect x="30" y="34" width="120" height="9" fill="#0f172a" rx="1"/>
  <!-- Roll (cyan) -->
  <rect x="30" y="48" width="100" height="5" fill="#0e7490" rx="1"/>
  <!-- Meta-line (mono) -->
  <rect x="30" y="62" width="180" height="3" fill="#475569" rx="0.5"/>
