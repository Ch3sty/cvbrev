  <line x1="30" y1="76" x2="270" y2="76" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== Sammanfattning ===== -->
  <rect x="30" y="92" width="240" height="3" fill="#1f2937" rx="0.5"/>
