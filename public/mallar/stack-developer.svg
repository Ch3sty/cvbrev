  <rect x="30" y="342" width="80" height="3" fill="#475569" rx="0.5"/>

  <!-- Mono "// Referenser..." -->
  <line x1="30" y1="372" x2="270" y2="372" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="30" y="380" width="100" height="3" fill="#94a3b8" rx="0.5"/>
