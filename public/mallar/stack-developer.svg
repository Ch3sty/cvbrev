  <rect x="30" y="312" width="60" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="322" x2="270" y2="322" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="321" width="22" height="2" fill="#0e7490"/>

  <!-- Edu 1 -->
  <rect x="30" y="332" width="100" height="4" fill="#0f172a" rx="0.5"/>
