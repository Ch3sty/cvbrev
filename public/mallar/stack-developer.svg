  <rect x="30" y="108" width="200" height="3" fill="#1f2937" rx="0.5"/>

  <!-- ===== Kompetens-grid (3 kolumner) med top/bottom borders ===== -->
  <line x1="30" y1="128" x2="270" y2="128" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Kolumn 1: SPRAK -->
  <rect x="30" y="138" width="38" height="3" fill="#0e7490" rx="0.5"/>
  <rect x="30" y="148" width="36" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="155" width="22" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="162" width="48" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="30" y="169" width="28" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Kolumn 2: FRAMEWORKS -->
  <rect x="115" y="138" width="58" height="3" fill="#0e7490" rx="0.5"/>
  <rect x="115" y="148" width="38" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="155" width="42" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="162" width="32" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="115" y="169" width="40" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Kolumn 3: VERKTYG -->
  <rect x="200" y="138" width="42" height="3" fill="#0e7490" rx="0.5"/>
  <rect x="200" y="148" width="35" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="155" width="48" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="162" width="28" height="2.5" fill="#1f2937" rx="0.5"/>
  <rect x="200" y="169" width="42" height="2.5" fill="#1f2937" rx="0.5"/>

  <line x1="30" y1="184" x2="270" y2="184" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== ARBETSLIVSERFARENHET ===== -->
  <rect x="30" y="198" width="80" height="4" fill="#0f172a" rx="0.5"/>
  <line x1="30" y1="208" x2="270" y2="208" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="207" width="22" height="2" fill="#0e7490"/>

  <!-- Job 1 -->
  <rect x="30" y="220" width="90" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="225" y="221" width="42" height="3" fill="#0e7490" rx="0.5"/>
  <rect x="30" y="230" width="65" height="3" fill="#475569" rx="0.5"/>
  <text x="30" y="244" font-size="6" fill="#94a3b8">–</text>
  <rect x="40" y="241" width="200" height="2.5" fill="#1f2937" rx="0.5"/>
  <text x="30" y="252" font-size="6" fill="#94a3b8">–</text>
  <rect x="40" y="249" width="180" height="2.5" fill="#1f2937" rx="0.5"/>

  <!-- Job 2 -->
  <rect x="30" y="266" width="80" height="4" fill="#0f172a" rx="0.5"/>
  <rect x="225" y="267" width="42" height="3" fill="#0e7490" rx="0.5"/>
  <rect x="30" y="276" width="55" height="3" fill="#475569" rx="0.5"/>
  <text x="30" y="290" font-size="6" fill="#94a3b8">–</text>
  <rect x="40" y="287" width="195" height="2.5" fill="#1f2937" rx="0.5"/>

