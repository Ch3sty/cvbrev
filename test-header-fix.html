<!DOCTYPE html>
<html>
<head>
    <title>Test Header Fix - Kreativ Profil</title>
</head>
<body>
    <h1>Test av förlängd header och borttaget dubblering</h1>
    <button onclick="testHeaderFix()">Test Kreativ Profil - Längre header utan duplicering</button>
    <div id="result"></div>
    
    <script>
        async function testHeaderFix() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testar...';
            
            try {
                const response = await fetch('http://localhost:3000/api/cv/generate-formatted', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        template: 'creative-edge',
                        cvText: `Christian Karlsson
christian.karlsson@example.com
070-123 45 67

PROFESSIONELL SAMMANFATTNING
Entusiastisk och pålitlig expedit med stor erfarenhet av att hantera ömtåliga produkter och strävar efter att öka försäljningen via bästa möjliga kundupplevelser. Flera års erfarenhet av olika detaljhandelsmiljöer med en dokumenterad meritlista.

ARBETSLIVSERFARENHET

Butikssäljare - ICA Maxi
2022-01-01 - Pågående
Ansvarar för kundservice, kassahantering och produktexponering. Ökat försäljningen med 15% genom proaktiv kundkontakt.

Säljare - Elektronikbutiken
2020-06-15 - 2021-12-31  
Sålde elektronikprodukter och tillbehör. Specialiserade mig på mobiltelefoner och datorer.

UTBILDNING

Handelsprogrammet - Komvux Stockholm
2018-08-25 - 2020-06-15
Fokus på försäljning, marknadsföring och kundservice.

KOMPETENSER
Kundservice, Kassasystem, Produktkunskap, Försäljning, Teamwork

SPRÅKKUNSKAPER
Svenska (modersmål), Engelska (flyt), Spanska (grundläggande)
`
                    })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'test-header-fix.pdf';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                    
                    resultDiv.innerHTML = '<p style="color: green;">✅ CV genererat! Kontrollera att:<br>1. Hela summary-texten syns i lila headern<br>2. Ingen "Professionell Sammanfattning" sektion finns<br>3. Text är inte vit mot vit bakgrund</p>';
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = '<p style="color: red;">❌ Fel: ' + response.status + ' - ' + errorText + '</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">❌ Fel: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
