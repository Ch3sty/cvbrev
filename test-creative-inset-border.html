<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Creative Minimal Inset Border</title>
</head>
<body>
    <script>
        // Test data för Creative Minimal template
        const testData = {
            personalInfo: {
                fullName: "Anna Andersson",
                email: "anna@example.com",
                phone: "070-123 45 67",
                address: "Storgatan 15",
                city: "Stockholm",
                zipCode: "111 20",
                profilePhotoUrl: "https://images.unsplash.com/photo-1494790108755-2616b612b5bc?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=687&q=80",
                linkedIn: "anna-andersson"
            },
            summary: "Jag är en social och glad person som trivs med teamarbete och ser till gruppens potential samt behov. Med gedigen erfarenhet inom projektledning och strategisk planering har jag lett framgångsrika initiativ som förbättrat både effektivitet och medarbetarengagemang."
        };

        // Generera HTML för Creative Minimal template
        fetch('/api/cv/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                templateId: 'creative-minimal',
                cvData: testData,
                options: {
                    includePhoto: true,
                    includeLinkedIn: true
                }
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.write(data.html);
                document.close();
            } else {
                document.body.innerHTML = `<h1>Fel: ${data.error}</h1>`;
            }
        })
        .catch(error => {
            document.body.innerHTML = `<h1>Fel: ${error.message}</h1>`;
        });
    </script>
</body>
</html>
