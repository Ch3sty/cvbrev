<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Jobbmatchning</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      background: #f7fafc;
      border-radius: 12px;
      border: 2px solid #e2e8f0;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
      margin-right: 10px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .loading {
      display: inline-block;
      margin-left: 10px;
      color: #667eea;
    }
    .job-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
      transition: all 0.3s;
    }
    .job-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
    }
    .job-title {
      font-size: 20px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
    }
    .job-company {
      font-size: 16px;
      color: #667eea;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .job-location {
      color: #718096;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .job-relevance {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .relevance-high {
      background: #c6f6d5;
      color: #22543d;
    }
    .relevance-medium {
      background: #fef3c7;
      color: #78350f;
    }
    .relevance-low {
      background: #e5e7eb;
      color: #374151;
    }
    .job-description {
      color: #4a5568;
      font-size: 14px;
      line-height: 1.6;
      margin: 10px 0;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .job-date {
      color: #a0aec0;
      font-size: 13px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }
    .search-terms {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0;
    }
    .search-chip {
      background: #edf2f7;
      color: #4a5568;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }
    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    .success {
      background: #c6f6d5;
      color: #22543d;
      padding: 15px;
      border-radius: 8px;
      margin: 15px 0;
    }
    pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Test Jobbmatchning</h1>
    <p class="subtitle">Testa jobbmatchning med Arbetsförmedlingens API</p>

    <div class="test-section">
      <h3>Steg 1: Testa JobSearch API direkt</h3>
      <button onclick="testJobSearchAPI()">Testa API</button>
      <div id="api-result"></div>
    </div>

    <div class="test-section">
      <h3>Steg 2: Testa Edge Function (kräver inloggning)</h3>
      <p style="font-size: 14px; color: #666;">
        Detta kräver att du är inloggad och har analyserat ett CV.
      </p>
      <button onclick="testEdgeFunction()">Testa Edge Function</button>
      <div id="edge-result"></div>
    </div>

    <div class="test-section">
      <h3>Resultat</h3>
      <div id="results"></div>
    </div>
  </div>

  <script>
    async function testJobSearchAPI() {
      const resultDiv = document.getElementById('api-result');
      resultDiv.innerHTML = '<div class="loading">Söker jobb...</div>';

      try {
        const url = 'https://jobsearch.api.jobtechdev.se/search?q=utvecklare&limit=10';
        console.log('Fetching from:', url);

        const response = await fetch(url, {
          headers: {
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`API error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        console.log('JobSearch API response:', data);

        const jobs = data.hits || [];

        resultDiv.innerHTML = `
          <div class="success">
            ✅ API fungerar! Hittade ${jobs.length} jobb.
          </div>
          <div class="stats">
            <div class="stat-card">
              <div class="stat-value">${jobs.length}</div>
              <div class="stat-label">Jobbannonser</div>
            </div>
            <div class="stat-card">
              <div class="stat-value">${data.total?.value || 0}</div>
              <div class="stat-label">Totalt i sökning</div>
            </div>
          </div>
        `;

        displayJobs(jobs);

      } catch (error) {
        console.error('Error:', error);
        resultDiv.innerHTML = `
          <div class="error">
            ❌ Fel: ${error.message}
          </div>
        `;
      }
    }

    async function testEdgeFunction() {
      const resultDiv = document.getElementById('edge-result');
      resultDiv.innerHTML = '<div class="loading">Anropar Edge Function...</div>';

      try {
        // Detta kräver att användaren är inloggad i Supabase
        const SUPABASE_URL = 'https://dbvbnbkvadvlhjhomibg.supabase.co';
        const functionUrl = `${SUPABASE_URL}/functions/v1/match-jobs`;

        // Försök hämta token från localStorage (om användaren är inloggad)
        let token = null;
        const supabaseAuth = localStorage.getItem('sb-dbvbnbkvadvlhjhomibg-auth-token');
        if (supabaseAuth) {
          const authData = JSON.parse(supabaseAuth);
          token = authData.access_token;
        }

        if (!token) {
          throw new Error('Ingen access token hittades. Du måste vara inloggad.');
        }

        console.log('Calling Edge Function:', functionUrl);

        const response = await fetch(functionUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({})
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || `HTTP ${response.status}`);
        }

        const data = await response.json();
        console.log('Edge Function response:', data);

        if (data.success) {
          const jobs = data.jobs || [];
          const searchTerms = data.searchTerms || {};

          resultDiv.innerHTML = `
            <div class="success">
              ✅ Edge Function fungerar!
            </div>
            <div class="stats">
              <div class="stat-card">
                <div class="stat-value">${jobs.length}</div>
                <div class="stat-label">Matchade jobb</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">${searchTerms.occupations?.length || 0}</div>
                <div class="stat-label">Yrkestitlar från CV</div>
              </div>
              <div class="stat-card">
                <div class="stat-value">${searchTerms.skills?.length || 0}</div>
                <div class="stat-label">Kompetenser från CV</div>
              </div>
            </div>
          `;

          if (searchTerms.occupations || searchTerms.skills) {
            let termsHTML = '<h4>Söktermer från ditt CV:</h4><div class="search-terms">';

            if (searchTerms.occupations) {
              searchTerms.occupations.forEach(occ => {
                termsHTML += `<span class="search-chip">🎯 ${occ}</span>`;
              });
            }

            if (searchTerms.skills) {
              searchTerms.skills.forEach(skill => {
                termsHTML += `<span class="search-chip">💡 ${skill}</span>`;
              });
            }

            termsHTML += '</div>';
            resultDiv.innerHTML += termsHTML;
          }

          displayJobs(jobs);
        }

      } catch (error) {
        console.error('Error:', error);
        resultDiv.innerHTML = `
          <div class="error">
            ❌ Fel: ${error.message}
            <p style="font-size: 13px; margin-top: 10px;">
              Tips: Öppna jobbcoach.ai i en annan flik, logga in och analysera ditt CV först.
            </p>
          </div>
        `;
      }
    }

    function displayJobs(jobs) {
      const resultsDiv = document.getElementById('results');

      if (!jobs || jobs.length === 0) {
        resultsDiv.innerHTML = '<p style="color: #666;">Inga jobb att visa.</p>';
        return;
      }

      let html = '<h3>Jobbannonser</h3>';

      jobs.forEach(job => {
        const relevance = job.relevance || 0;
        const relevanceClass = relevance >= 70 ? 'relevance-high' :
                              relevance >= 40 ? 'relevance-medium' : 'relevance-low';
        const relevanceLabel = relevance >= 70 ? 'Hög matchning' :
                              relevance >= 40 ? 'Medel matchning' : 'Låg matchning';

        const location = [
          job.workplace_address?.municipality,
          job.workplace_address?.region
        ].filter(Boolean).join(', ');

        const description = job.description?.text || '';
        const pubDate = new Date(job.publication_date).toLocaleDateString('sv-SE');

        html += `
          <div class="job-card">
            ${job.relevance !== undefined ? `
              <div class="job-relevance ${relevanceClass}">
                ${relevanceLabel} (${relevance}%)
              </div>
            ` : ''}
            <div class="job-title">${job.headline}</div>
            <div class="job-company">🏢 ${job.employer?.name || 'Okänt företag'}</div>
            ${location ? `<div class="job-location">📍 ${location}</div>` : ''}
            ${job.employment_type ? `<div class="job-location">💼 ${job.employment_type.label}</div>` : ''}
            <div class="job-description">${description}</div>
            <div class="job-date">📅 Publicerad: ${pubDate}</div>
            ${job.application_details?.url ? `
              <div style="margin-top: 15px;">
                <a href="${job.application_details.url}" target="_blank"
                   style="color: #667eea; font-weight: 600; text-decoration: none;">
                  Ansök här →
                </a>
              </div>
            ` : ''}
          </div>
        `;
      });

      resultsDiv.innerHTML = html;
    }

    // Auto-test API när sidan laddas
    window.addEventListener('load', () => {
      console.log('Sidan laddad, kör auto-test...');
      testJobSearchAPI();
    });
  </script>
</body>
</html>
